url: https://rauschenberger.github.io/corila/
template:
  bootstrap: 5
  math-rendering: mathjax
  bootswatch: cerulean

home:
  sidebar:
    structure: [links, community, citation, authors, dev]

navbar:
  title: "corila"
  left:
    - text: "functions"
      href: reference/index.html
    - text: "vignette"
      href: vignettes/vignette.html
    - text: "news"
      href: news/index.html

reference:
- title: "R Package"
  contents:
  - corila-package
- title: "Sparse group lasso regression"
  contents:
  - cv.corila
  - coef.cv.corila
  - predict.cv.corila
- title: "Multi-penalty ridge regression"
  contents:
  - multiridge
  - coef.multiridge
  - predict.multiridge
- title: "Other functions"
  contents:
  - matches(".*")
  - -cv.corila
  - -coef.cv.corila
  - -predict.cv.corila
  - -multiridge
  - -coef.multiridge
  - -predict.multiridge

