name: cyclocomp

on: [push, pull_request]

jobs:
  extra-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: cyclocomp, ecpc=?ignore, grpregOverlap=?ignore, scoop=?ignore, squeezy=?ignore

      - name: cyclocomp
        run: |
          x <- cyclocomp::cyclocomp_package_dir(".")
          cond <- x$cyclocomp > 10
          message <- paste(paste0(x$name[cond]," (",x$cyclocomp[cond],")"), collapse = ", ")
          if (length(cond) > 0) {stop("too complex: ", message)}
        shell: Rscript {0}