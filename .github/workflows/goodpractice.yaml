name: goodpractice

on: [push, pull_request]

jobs:
  autotest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            goodpractice
            ecpc=?ignore
            grpregOverlap=?ignore
            scoop=?ignore
            squeezy=?ignore

      - name: autotest
        run: |
          x <- goodpractice::gp(".")
          goodpractice::results(x)
        shell: Rscript {0}