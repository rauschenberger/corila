name: autotest

on: [push, pull_request]

jobs:
  autotest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            ropensci-review-tools/autotest
            ecpc=?ignore
            grpregOverlap=?ignore
            scoop=?ignore
            squeezy=?ignore

      - name: autotest
        run: |
          x <- autotest::autotest_package(test=TRUE)
          print(x)
          if (!is.null(x)) stop("autotest failed")
        shell: Rscript {0}